name: scavi-proweb
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  yolo-engine:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: development
    image: proweb-api:${APP_VERSION:-latest}
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
      - ./backend/models/license_plate_detector.pt:/app/models/license_plate_detector.pt:ro
    # Ejecuta el comando en background. 0 es para cámaras USB pasadas al docker (difícil sin devices), 
    # pero aquí podemos configurar un RTSP por defecto o hacer que el script lea la BD luego.
    command: >
      sh -c "sleep 10 && python manage.py run_camera_stream --url /app/models/video_prueba.mp4"
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: ${NODE_ENV:-development}
    image: proweb-api:${APP_VERSION:-latest}
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
      - ./backend/models/license_plate_detector.pt:/app/models/license_plate_detector.pt:ro
    command: >
      sh -c "python manage.py migrate --noinput &&
            python manage.py runserver 0.0.0.0:8000"
    ports:
      - "127.0.0.1:8000:8000" 
    networks:
      - frontend
      - backend
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Django no suele traer curl; se usa python para chequear el puerto
      test: ["CMD", "python", "-c", "import socket; s = socket.socket(); s.connect(('localhost', 8000))"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: ${NODE_ENV:-development}
    image: proweb-web:${APP_VERSION:-latest}
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "127.0.0.1:5173:5173"
    networks:
      - frontend
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173/"]
      interval: 10s
      timeout: 5s
      retries: 3

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/init-db.sh:/docker-entrypoint-initdb.d/init.sh:ro
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      POSTGRES_INITDB_ARGS: --encoding=UTF-8 --auth-host=md5
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
    networks:
      - frontend
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    command: sh -c "sleep 3 && nginx -g 'daemon off;'"

networks:
  frontend:
    driver: bridge
  backend:
    internal: true

volumes:
  db_data:
  static_volume:
